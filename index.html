<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQA Science Spaced Repetition MVP</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --text: #333333;
      --text-muted: #666666;
      --primary: #4a90e2;
      --primary-hover: #357abd;
      --success: #2ecc71;
      --error: #e74c3c;
      --border: #dcdde1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    header {
      margin-bottom: 25px;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 15px;
      color: #34495e;
    }

    /* ====== NEW MODERN FILTER DROPDOWN ROW ====== */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }

    .filter-group {
      flex: 1;
      min-width: 160px; /* Prevents squishing on mobile layouts */
      display: flex;
      flex-direction: column;
    }

    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      margin-left: 2px;
    }

    .custom-select {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      background-color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease-in-out;
      appearance: none; /* Clears legacy native browser styling arrows */
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23666666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 16px;
      padding-right: 35px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .custom-select:hover {
      border-color: #b1b2b6;
      background-color: #fafafa;
    }

    .custom-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    #topicCountSummary {
      font-size: 0.85rem;
      color: var(--text-muted);
      background: #edf2f7;
      padding: 8px 14px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 15px;
      font-weight: 500;
    }

    /* ====== BUTTONS & UTILITIES ====== */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: white;
    }

    .btn-primary { background-color: var(--primary); }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-secondary { background-color: #7f8c8d; }
    .btn-secondary:hover { background-color: #95a5a6; }
    .btn-success { background-color: var(--success); width: 100%; }
    .btn-success:hover { background-color: #27ae60; }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    .item {
      padding: 12px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .muted { font-size: 0.85rem; color: var(--text-muted); }
    .chip { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .good { color: var(--success); font-weight: bold; }
    .bad { color: var(--error); font-weight: bold; }
    .hidden { display: none !important; }
    hr { margin: 15px 0; border: 0; border-top: 1px solid var(--border); }

    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .input-group input[type="email"],
    .input-group input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .mcq-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .mcq-option {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #f8f9fa;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }
    .mcq-option input { margin-right: 12px; transform: scale(1.1); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>AQA Science Spaced Repetition</h1>
      <div id="authMsg" class="muted">Checking session status...</div>
    </header>

    <section id="auth" class="card hidden">
      <h2>🔑 Student Authentication Gate</h2>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="student@school.co.uk" />
      </div>
      <div class="input-group">
        <label for="password">Security Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button id="btnSignIn" class="btn-primary">Sign In</button>
        <button id="btnSignUp" class="btn-secondary">Register Account</button>
      </div>
    </section>

    <section id="dashboard" class="card hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>🎯 Review Dashboard</h2>
        <div>
          <span id="userChip" class="chip">...</span>
          <button id="btnSignOut" class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem; margin-left: 10px; flex: none;">Sign Out</button>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-group">
          <label for="subjectFilter">Subject</label>
          <select id="subjectFilter" class="custom-select">
            <option value="physics">Physics</option>
            <option value="biology">Biology</option>
            <option value="chemistry">Chemistry</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="paperFilter">Paper Target</label>
          <select id="paperFilter" class="custom-select">
            <option value="paper1">Paper 1</option>
            <option value="paper2">Paper 2</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="typeFilter">Question Typology</label>
          <select id="typeFilter" class="custom-select">
            <option value="">All Question Types</option>
            <option value="short_text">Short Text / Written</option>
            <option value="mcq">Multiple Choice (MCQs)</option>
            <option value="numeric">Numeric / Calculations</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="topicFilter">Specification Topic Area</label>
          <select id="topicFilter" class="custom-select">
            <option value="">All topics</option>
          </select>
        </div>
      </div>

      <div id="topicCountSummary">Calculating baseline questions footprint...</div>

      <div style="margin: 20px 0;">
        <h3>Due Item Queue: <span id="dueCount" style="color: var(--primary);">0</span> target objectives waiting</h3>
      </div>

      <div class="btn-group">
        <button id="btnStartDue" class="btn-primary">Start Due Review Run</button>
        <button id="btnStartAny" class="btn-secondary">Open Practice Mode (Randomized)</button>
      </div>

      <hr/>
      <div style="margin-bottom: 10px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Active Schedule Forecast:</div>
      <div id="dueList"></div>
    </section>

    <section id="session" class="card hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2>📝 Testing Session Workspace</h2>
        <div id="progress" class="chip">Question 0 of 0</div>
      </div>

      <div id="qBox"></div>
      
      <div id="feedback" style="margin: 15px 0;"></div>

      <div class="btn-group" style="margin-top: 20px;">
        <button id="btnSubmit" class="btn-success">Submit & Verify Evaluation Matrix</button>
        <button id="btnNext" class="btn-primary hidden">Advance to Next Concept Node →</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
