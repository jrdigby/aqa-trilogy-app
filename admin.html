<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AQA Trilogy Question Bank Creator (Admin)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg: #f4f7f6;
      --card-bg: #ffffff;
      --text: #333333;
      --primary: #00a86b;
      --border: #dddddd;
    }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 750px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .row { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
    button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Create Question</h2>
    
    <div class="row">
      <label>Specification Point ID</label>
      <input type="text" id="specPointId" placeholder="e.g. 4.5.1.1">
    </div>

    <div class="row">
      <label>Question Type</label>
      <select id="questionType">
        <option value="mcq">MCQ</option>
        <option value="extended_response">Extended Response</option>
        <option value="numeric">Numeric</option>
      </select>
    </div>

    <div class="row">
      <label>Prompt</label>
      <textarea id="prompt" rows="3"></textarea>
    </div>

    <!-- Added Image Input -->
    <div class="row">
      <label for="qImage">Question Image (Optional)</label>
      <input id="qImage" type="file" accept="image/*" />
    </div>

    <button id="btnCommit">Commit Question</button>
  </div>
</div>

<script>
  // Initialize your supabase client here with your credentials
  const supabaseClient = supabase.createClient('YOUR_URL', 'YOUR_KEY');

  document.getElementById('btnCommit').onclick = async () => {
    const specPointId = document.getElementById('specPointId').value;
    const questionType = document.getElementById('questionType').value;
    const prompt = document.getElementById('prompt').value;
    const fileInput = document.getElementById('qImage');

    let publicImageUrl = null;

    // 1. Upload Logic
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const fileExt = file.name.split('.').pop();
      // Generate a unique file name
      const fileName = `${Date.now()}_${Math.floor(Math.random()*1000)}.${fileExt}`;
      const filePath = `questions/${fileName}`;

      const { error: uploadErr } = await supabaseClient
        .storage
        .from('question-images')
        .upload(filePath, file);

      if (uploadErr) {
        alert("Image upload failed: " + uploadErr.message);
        return;
      }

      const { data } = supabaseClient.storage.from('question-images').getPublicUrl(filePath);
      publicImageUrl = data.publicUrl;
    }

    // 2. Database Insert
    const { data, error } = await supabaseClient
      .from("questions")
      .insert({
        spec_point_id: specPointId,
        question_type: questionType,
        prompt: prompt,
        image_url: publicImageUrl // Saved to DB
      });

    if (error) alert("Database insert failed: " + error.message);
    else alert("Question committed successfully!");
  };
</script>
</body>
</html>
